<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Day Reveal</title>
</head>
<body>
    <h1>Date Day Reveal</h1>
    <button id="dateButton">Show Date</button>
    <p id="dateOutput"></p>

    <script>
        var button = document.getElementById('dateButton');
        var output = document.getElementById('dateOutput');

        button.addEventListener('click', function() {
            var now = new Date();
            var formattedDate = now.getUTCFullYear() + '-' +
                                ('0' + (now.getUTCMonth() + 1)).slice(-2) + '-' +
                                ('0' + now.getUTCDate()).slice(-2) + ' ' +
                                ('0' + now.getUTCHours()).slice(-2) + ':' +
                                ('0' + now.getUTCMinutes()).slice(-2) + ':' +
                                ('0' + now.getUTCSeconds()).slice(-2);
            output.textContent = formattedDate;
        });
    </script>
</body>
</html>
